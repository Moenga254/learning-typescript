<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Viewer</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    input {
      padding: 10px;
      width: 300px;
      margin-bottom: 20px;
    }

    .user {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    #status {
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* Empty state styles */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
      color: #6b7280;
    }

    .empty-state__icon {
      margin-bottom: 16px;
      color: #d1d5db;
    }

    .empty-state__message {
      font-size: 1rem;
      font-weight: 500;
      color: #374151;
      margin: 0 0 8px;
    }

    .empty-state__hint {
      font-size: 0.875rem;
      color: #9ca3af;
      margin: 0;
    }
  </style>
</head>
<body>

  <h1>User Search</h1>

  <input type="text" id="search" placeholder="Search user..." />

  <div id="status">Loading...</div>
  <div id="results"></div>

  <script src="index.js"></script>
</body>
</html>
